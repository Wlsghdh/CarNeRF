{% extends "base.html" %}
{% block title %}내 차 팔기{% endblock %}

{% block content %}
<div class="max-w-3xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
    <h1 class="text-2xl font-bold mb-2">내 차 팔기</h1>
    <p class="text-gray-500 mb-8">차량 정보를 입력하고 매물을 등록하세요</p>

    <form id="sell-form" class="space-y-8">
        <!-- Step 1: Basic Info -->
        <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-6">
            <h2 class="font-semibold text-lg mb-4 flex items-center gap-2">
                <span class="w-6 h-6 bg-primary-600 text-white rounded-full flex items-center justify-center text-xs font-bold">1</span>
                기본 정보
            </h2>
            <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">브랜드 <span class="text-red-500">*</span></label>
                    <select name="brand" required class="w-full border border-gray-200 rounded-lg px-3 py-2.5 text-sm focus:ring-2 focus:ring-primary-500 focus:border-transparent">
                        <option value="">선택</option>
                        <option>현대</option><option>기아</option><option>제네시스</option>
                        <option>쉐보레</option><option>르노</option><option>쌍용</option>
                        <option>BMW</option><option>벤츠</option><option>아우디</option><option>기타</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">모델 <span class="text-red-500">*</span></label>
                    <input type="text" name="model" required placeholder="예: 그랜저" class="w-full border border-gray-200 rounded-lg px-3 py-2.5 text-sm focus:ring-2 focus:ring-primary-500 focus:border-transparent">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">연식 <span class="text-red-500">*</span></label>
                    <input type="number" name="year" required min="2000" max="2026" placeholder="2023" class="w-full border border-gray-200 rounded-lg px-3 py-2.5 text-sm focus:ring-2 focus:ring-primary-500 focus:border-transparent">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">트림</label>
                    <input type="text" name="trim" placeholder="예: 프리미엄" class="w-full border border-gray-200 rounded-lg px-3 py-2.5 text-sm focus:ring-2 focus:ring-primary-500 focus:border-transparent">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">연료 <span class="text-red-500">*</span></label>
                    <select name="fuel_type" required class="w-full border border-gray-200 rounded-lg px-3 py-2.5 text-sm focus:ring-2 focus:ring-primary-500 focus:border-transparent">
                        <option value="">선택</option>
                        <option>가솔린</option><option>디젤</option><option>전기</option><option>하이브리드</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">변속기 <span class="text-red-500">*</span></label>
                    <select name="transmission" required class="w-full border border-gray-200 rounded-lg px-3 py-2.5 text-sm focus:ring-2 focus:ring-primary-500 focus:border-transparent">
                        <option value="">선택</option>
                        <option>자동</option><option>수동</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">주행거리 (km) <span class="text-red-500">*</span></label>
                    <input type="number" name="mileage" required min="0" placeholder="32000" class="w-full border border-gray-200 rounded-lg px-3 py-2.5 text-sm focus:ring-2 focus:ring-primary-500 focus:border-transparent">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">색상</label>
                    <input type="text" name="color" placeholder="예: 화이트" class="w-full border border-gray-200 rounded-lg px-3 py-2.5 text-sm focus:ring-2 focus:ring-primary-500 focus:border-transparent">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">배기량 (cc)</label>
                    <input type="number" name="engine_cc" min="0" placeholder="2000" class="w-full border border-gray-200 rounded-lg px-3 py-2.5 text-sm focus:ring-2 focus:ring-primary-500 focus:border-transparent">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">지역</label>
                    <input type="text" name="region" placeholder="예: 서울" class="w-full border border-gray-200 rounded-lg px-3 py-2.5 text-sm focus:ring-2 focus:ring-primary-500 focus:border-transparent">
                </div>
            </div>
        </div>

        <!-- Step 2: Price -->
        <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-6">
            <h2 class="font-semibold text-lg mb-4 flex items-center gap-2">
                <span class="w-6 h-6 bg-primary-600 text-white rounded-full flex items-center justify-center text-xs font-bold">2</span>
                가격 정보
            </h2>
            <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">판매 가격 (만원) <span class="text-red-500">*</span></label>
                    <input type="number" name="price" required min="0" placeholder="3000" class="w-full border border-gray-200 rounded-lg px-3 py-2.5 text-sm focus:ring-2 focus:ring-primary-500 focus:border-transparent">
                </div>
                <div class="flex items-end pb-1">
                    <label class="flex items-center gap-2 cursor-pointer">
                        <input type="checkbox" name="is_negotiable" checked class="w-4 h-4 text-primary-600 rounded border-gray-300 focus:ring-primary-500">
                        <span class="text-sm text-gray-700">가격 협의 가능</span>
                    </label>
                </div>
            </div>
        </div>

        <!-- Step 3: Photos -->
        <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-6">
            <h2 class="font-semibold text-lg mb-4 flex items-center gap-2">
                <span class="w-6 h-6 bg-primary-600 text-white rounded-full flex items-center justify-center text-xs font-bold">3</span>
                사진
            </h2>
            <div id="image-preview" class="grid grid-cols-3 sm:grid-cols-4 gap-3 mb-4"></div>
            <label class="flex flex-col items-center justify-center w-full h-32 border-2 border-dashed border-gray-200 rounded-xl cursor-pointer hover:border-primary-400 hover:bg-primary-50/50 transition">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-8 h-8 text-gray-400 mb-2"><path stroke-linecap="round" stroke-linejoin="round" d="M2.25 15.75l5.159-5.159a2.25 2.25 0 013.182 0l5.159 5.159m-1.5-1.5l1.409-1.41a2.25 2.25 0 013.182 0l2.909 2.91M6.75 7.5l.75-.75M18 3v4.5m0 0V12m0-4.5h4.5m-4.5 0H13.5" /></svg>
                <span class="text-sm text-gray-500">사진을 선택하세요 (최대 10장)</span>
                <input type="file" id="image-input" accept="image/*" multiple class="hidden">
            </label>
        </div>

        <!-- Step 4: Description -->
        <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-6">
            <h2 class="font-semibold text-lg mb-4 flex items-center gap-2">
                <span class="w-6 h-6 bg-primary-600 text-white rounded-full flex items-center justify-center text-xs font-bold">4</span>
                상세 설명
            </h2>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">제목 <span class="text-red-500">*</span></label>
                <input type="text" name="title" required placeholder="예: 그랜저 르블랑 풀옵 무사고" class="w-full border border-gray-200 rounded-lg px-3 py-2.5 text-sm focus:ring-2 focus:ring-primary-500 focus:border-transparent mb-4">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">상세 설명</label>
                <textarea name="description" rows="5" placeholder="차량 상태, 옵션, 특이사항 등을 자세히 적어주세요" class="w-full border border-gray-200 rounded-lg px-3 py-2.5 text-sm focus:ring-2 focus:ring-primary-500 focus:border-transparent resize-none"></textarea>
            </div>
        </div>

        <!-- Step 5: 3D Scan -->
        <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-6">
            <h2 class="font-semibold text-lg mb-4 flex items-center gap-2">
                <span class="w-6 h-6 bg-primary-600 text-white rounded-full flex items-center justify-center text-xs font-bold">5</span>
                3D 스캔 <span class="text-xs bg-blue-100 text-blue-600 px-2 py-0.5 rounded-full ml-1">선택</span>
            </h2>
            <div id="scan-upload-area" class="bg-gray-50 rounded-xl p-6 text-center">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-10 h-10 text-primary-400 mx-auto mb-3"><path stroke-linecap="round" stroke-linejoin="round" d="M21 7.5l-2.25-1.313M21 7.5v2.25m0-2.25l-2.25 1.313M3 7.5l2.25-1.313M3 7.5l2.25 1.313M3 7.5v2.25m9 3l2.25-1.313M12 12.75l-2.25-1.313M12 12.75V15m0 6.75l2.25-1.313M12 21.75V19.5m0 2.25l-2.25-1.313m0-16.875L12 2.25l2.25 1.313M21 14.25v2.25l-2.25 1.313m-13.5 0L3 16.5v-2.25" /></svg>
                <p class="font-medium text-gray-700 mb-1">3D 스캔 서비스</p>
                <p class="text-sm text-gray-500 mb-3">차량 주위를 천천히 한 바퀴 도는 영상(30초~1분)을 업로드하세요</p>
                <label class="inline-flex items-center gap-2 bg-primary-600 text-white px-6 py-2.5 rounded-lg text-sm font-medium cursor-pointer hover:bg-primary-700 transition">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-5 h-5"><path stroke-linecap="round" stroke-linejoin="round" d="m15.75 10.5 4.72-4.72a.75.75 0 0 1 1.28.53v11.38a.75.75 0 0 1-1.28.53l-4.72-4.72M4.5 18.75h9a2.25 2.25 0 0 0 2.25-2.25v-9a2.25 2.25 0 0 0-2.25-2.25h-9A2.25 2.25 0 0 0 2.25 7.5v9a2.25 2.25 0 0 0 2.25 2.25Z" /></svg>
                    영상 선택
                    <input type="file" id="video-input" accept="video/mp4,video/quicktime,video/x-msvideo,video/webm,.mp4,.mov,.avi,.mkv,.webm" class="hidden">
                </label>
                <p id="video-filename" class="text-xs text-gray-400 mt-2 hidden"></p>
            </div>
            <!-- Progress area (hidden by default) -->
            <div id="scan-progress" class="hidden mt-4 bg-blue-50 rounded-xl p-6">
                <div class="flex items-center gap-3 mb-3">
                    <div class="w-5 h-5 border-2 border-primary-600 border-t-transparent rounded-full animate-spin"></div>
                    <span id="scan-status-text" class="text-sm font-medium text-primary-700">처리 중...</span>
                </div>
                <div class="w-full bg-blue-200 rounded-full h-2">
                    <div id="scan-progress-bar" class="bg-primary-600 h-2 rounded-full transition-all duration-500" style="width: 0%"></div>
                </div>
                <p id="scan-message" class="text-xs text-gray-500 mt-2"></p>
            </div>
            <!-- Done area -->
            <div id="scan-done" class="hidden mt-4 bg-green-50 rounded-xl p-4 text-center">
                <p class="text-green-700 font-medium">3D 모델 생성 완료!</p>
                <a id="scan-view-link" href="#" class="text-sm text-primary-600 hover:underline mt-1 inline-block">3D 모델 보기 →</a>
            </div>
        </div>

        <!-- Submit -->
        <div class="flex gap-4">
            <button type="submit" class="flex-1 bg-primary-600 text-white py-3 rounded-xl font-semibold hover:bg-primary-700 transition text-lg">
                매물 등록하기
            </button>
        </div>

        <div id="form-message" class="hidden text-center p-4 rounded-xl"></div>
    </form>
</div>
{% endblock %}

{% block scripts %}
<script src="/static/js/sell.js"></script>
{% endblock %}
