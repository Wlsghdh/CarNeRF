<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D 뷰어 - {{ vehicle.brand }} {{ vehicle.model }} | CarNeRF</title>
    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.162.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.162.0/examples/jsm/",
            "@mkkellogg/gaussian-splats-3d": "https://unpkg.com/@mkkellogg/gaussian-splats-3d@0.4.7/build/gaussian-splats-3d.module.js"
        }
    }
    </script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #1a1a2e; overflow: hidden; font-family: 'Pretendard', sans-serif; }
        #viewer-fullscreen { width: 100vw; height: 100vh; }
        .overlay-info {
            position: fixed; top: 16px; left: 16px;
            background: rgba(0,0,0,0.6); backdrop-filter: blur(10px);
            color: white; padding: 12px 20px; border-radius: 12px;
            font-size: 14px; z-index: 10;
        }
        .overlay-info h2 { font-size: 16px; font-weight: 600; margin-bottom: 2px; }
        .overlay-info p { font-size: 12px; color: rgba(255,255,255,0.6); }
        .back-btn {
            position: fixed; top: 16px; right: 16px;
            background: rgba(255,255,255,0.15); backdrop-filter: blur(10px);
            color: white; padding: 8px 16px; border-radius: 8px;
            border: 1px solid rgba(255,255,255,0.2); font-size: 13px;
            cursor: pointer; z-index: 10; text-decoration: none;
        }
        .back-btn:hover { background: rgba(255,255,255,0.25); }
        .placeholder-msg {
            position: fixed; inset: 0; display: flex; flex-direction: column;
            align-items: center; justify-content: center; color: white; z-index: 5;
        }
        .placeholder-msg svg { width: 48px; height: 48px; color: rgba(255,255,255,0.4); margin-bottom: 12px; }
        .placeholder-msg h3 { font-size: 18px; font-weight: 600; }
        .placeholder-msg p { font-size: 14px; color: rgba(255,255,255,0.5); margin-top: 4px; }
    </style>
</head>
<body>
    <div class="overlay-info">
        <h2>{{ vehicle.brand }} {{ vehicle.model }}</h2>
        <p>{{ vehicle.year }}년 {{ vehicle.trim or '' }} | 마우스로 회전, 스크롤로 확대</p>
    </div>
    <a href="/vehicles/{{ vehicle.id }}" class="back-btn">&larr; 상세 페이지로</a>

    {% if vehicle.model_3d_status == 'ready' %}
    <div id="viewer-fullscreen"></div>
    {% else %}
    <div class="placeholder-msg">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M21 7.5l-2.25-1.313M21 7.5v2.25m0-2.25l-2.25 1.313M3 7.5l2.25-1.313M3 7.5l2.25 1.313M3 7.5v2.25m9 3l2.25-1.313M12 12.75l-2.25-1.313M12 12.75V15m0 6.75l2.25-1.313M12 21.75V19.5m0 2.25l-2.25-1.313m0-16.875L12 2.25l2.25 1.313M21 14.25v2.25l-2.25 1.313m-13.5 0L3 16.5v-2.25" /></svg>
        <h3>3D 스캔 준비 중</h3>
        <p>이 차량의 3D 모델이 곧 준비됩니다</p>
    </div>
    {% endif %}

    {% if vehicle.model_3d_status == 'ready' %}
    <script type="module">
        import { initViewer } from '/static/js/viewer.js';
        initViewer('viewer-fullscreen', {
            modelUrl: '{{ vehicle.model_3d_url }}',
            autoRotate: false,
            backgroundColor: 0x1a1a2e,
        });
    </script>
    {% endif %}
</body>
</html>
